[theme]
# Dark mode developer palette (GitHub-inspired)
primaryColor = "#a855f7"             # purple accent
backgroundColor = "#0d1117"          # GitHub-dark background
secondaryBackgroundColor = "#161b22" # cards and panels
textColor = "#f0f6fc"                # light text
linkColor = "#58a6ff"                # GitHub blue links
borderColor = "#30363d"              # subtle borders
showWidgetBorder = true
baseRadius = "0.375rem"              # rounded corners
codeBackgroundColor = "#21262d"      # code block background
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#161b22"
secondaryBackgroundColor = "#21262d"